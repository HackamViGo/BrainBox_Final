version: 2

updates:
  # ── pnpm (монорепо root) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Sofia
    open-pull-requests-limit: 5
    groups:
      # Групира всички patch updates в 1 PR
      patch-updates:
        patterns: ['*']
        update-types: ['patch']
      # Групира dev tools заедно
      dev-tooling:
        patterns:
          - 'typescript'
          - 'eslint*'
          - '@types/*'
          - 'vitest'
          - '@vitejs/*'
          - 'vite-tsconfig-paths'
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'prettier'
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: 'chore'
      include: scope

  # ── apps/web-app ─────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /apps/web-app
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Sofia
    open-pull-requests-limit: 5
    groups:
      next-ecosystem:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react*'
      supabase:
        patterns:
          - '@supabase/*'
      ui-libs:
        patterns:
          - 'motion'
          - 'lucide-react'
          - '@radix-ui/*'
          - 'tw-animate-css'
          - 'clsx'
          - 'tailwind-merge'
    labels:
      - dependencies
      - automated
    ignore:
      # Major версии → ръчно (breaking changes)
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']

  # ── GitHub Actions ────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
